{{- if .Values.overlay.all }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rhoai-2254-all
  namespace: openshift-gitops
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/rhpds/rhoai-migration-automation.git
    targetRevision: {{ .Values.repoRevision }}
    path: rhoai-2254-install/gitops/overlays/all
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-gitops
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 10
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
{{- end }}
