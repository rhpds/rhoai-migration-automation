---
apiVersion: v1
kind: Namespace
metadata:
  name: project-alpha
  labels:
    opendatahub.io/dashboard: "true"
    modelmesh-enabled: "false"
---
# FeatureStore — Technology Preview in 2.25.4, GA in 3.3.3. Migration §2.4 verifies Ready state.
apiVersion: feast.dev/v1alpha1
kind: FeatureStore
metadata:
  name: my-featurestore
  namespace: project-alpha
spec:
  feastProject: demo
---
# CronJob that ingests data into the feature store — migration §2.4 lists these pre-upgrade.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: feast-sample-git
  namespace: project-alpha
spec:
  schedule: "@yearly"
  suspend: true
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: feast-apply
              image: quay.io/feastdev/feature-server:0.50.0
              command: ["sh", "-c", "echo 'feast apply stub'; sleep 5"]
