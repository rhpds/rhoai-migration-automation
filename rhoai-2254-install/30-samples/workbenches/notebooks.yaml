---
apiVersion: v1
kind: Namespace
metadata:
  name: workbenches-regular
  labels:
    opendatahub.io/dashboard: "true"
    modelmesh-enabled: "false"
---
apiVersion: v1
kind: Namespace
metadata:
  name: workbenches-hwp
  labels:
    opendatahub.io/dashboard: "true"
    modelmesh-enabled: "false"
# ServiceAccounts and PVCs MUST be created before the Notebook CR —
# otherwise the Notebook controller races ahead and auto-creates an SA,
# after which `oc apply` sees AlreadyExists when it tries to create ours.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: jupyter-2025-1
  namespace: workbenches-regular
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jupyter-2025-1
  namespace: workbenches-regular
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: codeserver-2025-1
  namespace: workbenches-regular
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: codeserver-2025-1
  namespace: workbenches-regular
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: custom
  namespace: workbenches-regular
---
# Grant the `custom` SA OpenShift's anyuid SCC so the BYON workbench image (based on
# the upstream jupyter/scipy-notebook) can run as its baked-in UID 1000 (jovyan).
# This is the standard workaround RHOAI admins apply for custom images that aren't
# built for random UIDs.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: custom-anyuid
  namespace: workbenches-regular
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:anyuid
subjects:
  - kind: ServiceAccount
    name: custom
    namespace: workbenches-regular
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: custom
  namespace: workbenches-regular
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: jupyter-2025-1
  namespace: workbenches-hwp
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jupyter-2025-1-hwp
  namespace: workbenches-hwp
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
---
# Jupyter workbench, 2025.1 image (older — migration §2.6 recommends upgrading to 2025.2 first)
apiVersion: kubeflow.org/v1
kind: Notebook
metadata:
  name: jupyter-2025-1
  namespace: workbenches-regular
  labels:
    app: jupyter-2025-1
    opendatahub.io/dashboard: "true"
  annotations:
    opendatahub.io/image-display-name: "Jupyter | Standard Data Science | CPU | 2025.1"
    notebooks.opendatahub.io/inject-oauth: "true"
    notebooks.kubeflow.org/last-activity: ""
spec:
  template:
    spec:
      serviceAccountName: jupyter-2025-1
      containers:
        - name: jupyter-2025-1
          image: image-registry.openshift-image-registry.svc:5000/redhat-ods-applications/jupyter-datascience-cpu-py312-ubi9:2025.1
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 4Gi
          ports:
            - containerPort: 8888
              name: notebook-port
              protocol: TCP
          env:
            - name: NOTEBOOK_ARGS
              value: |-
                --ServerApp.port=8888
                --ServerApp.token=''
                --ServerApp.password=''
                --ServerApp.base_url=/notebook/workbenches-regular/jupyter-2025-1
          volumeMounts:
            - name: jupyter-2025-1
              mountPath: /opt/app-root/src
      volumes:
        - name: jupyter-2025-1
          persistentVolumeClaim:
            claimName: jupyter-2025-1
---
# code-server workbench, 2025.1 image (older — migration §2.6 requires 2025.2 before upgrade)
apiVersion: kubeflow.org/v1
kind: Notebook
metadata:
  name: codeserver-2025-1
  namespace: workbenches-regular
  labels:
    app: codeserver-2025-1
    opendatahub.io/dashboard: "true"
  annotations:
    opendatahub.io/image-display-name: "code-server | 2025.1"
    notebooks.opendatahub.io/inject-oauth: "true"
spec:
  template:
    spec:
      serviceAccountName: codeserver-2025-1
      containers:
        - name: codeserver-2025-1
          image: image-registry.openshift-image-registry.svc:5000/redhat-ods-applications/code-server-notebook:2025.1
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 4Gi
          ports:
            - containerPort: 8888
              name: notebook-port
              protocol: TCP
          volumeMounts:
            - name: codeserver-2025-1
              mountPath: /opt/app-root/src
      volumes:
        - name: codeserver-2025-1
          persistentVolumeClaim:
            claimName: codeserver-2025-1
---
# Custom-image workbench — uses an UPSTREAM Jupyter image (not RHOAI's ImageStream).
# §2.6.1 flags custom images as needing migration to the Kubernetes Gateway API for
# path-based routing. Having this Notebook lets rhai-cli exercise that check path.
apiVersion: kubeflow.org/v1
kind: Notebook
metadata:
  name: custom
  namespace: workbenches-regular
  labels:
    app: custom
    opendatahub.io/dashboard: "true"
  annotations:
    opendatahub.io/image-display-name: "Custom | SciPy + mlflow + onnxruntime (BYON 2.x)"
    notebooks.opendatahub.io/inject-oauth: "true"
spec:
  template:
    spec:
      serviceAccountName: custom
      securityContext:
        runAsUser: 1000
        runAsGroup: 100
        fsGroup: 100
      containers:
        - name: custom
          image: quay.io/hayesphilip/rhoai-workbench-2x:lab-4.2.5
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 4Gi
          ports:
            - containerPort: 8888
              name: notebook-port
              protocol: TCP
          env:
            # The upstream community Jupyter image has no NB_PREFIX awareness and
            # would default to serving at "/". The RHOAI 2.x Dashboard's "Open"
            # link points at /notebook/<ns>/<name>/, so without base_url set,
            # learners get "404 - You are requesting a page that does not exist".
            # (Module 4 of the workshop re-builds this image with an NB_PREFIX-aware
            # entrypoint; this NOTEBOOK_ARGS workaround keeps the BYON image usable
            # on 2.x in the meantime.)
            - name: NOTEBOOK_ARGS
              value: |-
                --ServerApp.port=8888
                --ServerApp.token=''
                --ServerApp.password=''
                --ServerApp.base_url=/notebook/workbenches-regular/custom
          volumeMounts:
            - name: custom
              mountPath: /opt/app-root/src
      volumes:
        - name: custom
          persistentVolumeClaim:
            claimName: custom
---
# Jupyter workbench in hardware-profile namespace (already on 2025.1 so migration can compare)
apiVersion: kubeflow.org/v1
kind: Notebook
metadata:
  name: jupyter-2025-1
  namespace: workbenches-hwp
  labels:
    app: jupyter-2025-1
    opendatahub.io/dashboard: "true"
  annotations:
    opendatahub.io/image-display-name: "Jupyter | Standard Data Science | CPU | 2025.1"
    notebooks.opendatahub.io/inject-oauth: "true"
spec:
  template:
    spec:
      serviceAccountName: jupyter-2025-1
      containers:
        - name: jupyter-2025-1
          image: image-registry.openshift-image-registry.svc:5000/redhat-ods-applications/jupyter-datascience-cpu-py312-ubi9:2025.1
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 4Gi
          ports:
            - containerPort: 8888
              name: notebook-port
              protocol: TCP
          volumeMounts:
            - name: jupyter-2025-1-hwp
              mountPath: /opt/app-root/src
      volumes:
        - name: jupyter-2025-1-hwp
          persistentVolumeClaim:
            claimName: jupyter-2025-1-hwp
