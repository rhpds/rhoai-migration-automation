---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rhoai-2254-sample-workbenches
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "20"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/rhpds/rhoai-migration-automation.git
    targetRevision: main
    path: rhoai-2254-install/30-samples/workbenches
  destination:
    server: https://kubernetes.default.svc
    namespace: workbenches-regular
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
      # The Kubeflow Notebook controller defaults image tags, adds oauth-proxy
      # sidecar spec, and injects PVC volumes. SSA tracks operator field
      # ownership so those additions don't register as drift.
      - ServerSideApply=true
    retry:
      limit: 60
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 2m
