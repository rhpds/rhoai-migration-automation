---
# Wave 0: Service Mesh v2 + Kiali operators (Subscriptions only).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rhoai-2254-operator-servicemesh-v2
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/rh-aiservices-bu/rhoai-2.25-baseline.git
    targetRevision: main
    path: rhoai-2254-install/10-operators
    directory:
      include: "servicemesh-v2.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-operators
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    retry:
      limit: 10
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
