---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rhoai-2254-sample-llama-stack
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "20"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/rh-aiservices-bu/rhoai-2.25-baseline.git
    targetRevision: main
    path: rhoai-2254-install/30-samples/llama-stack
  destination:
    server: https://kubernetes.default.svc
    namespace: ldap-user17-rag-225
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 60
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 2m
