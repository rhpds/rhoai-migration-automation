---
# TrustyAI spans three namespaces (test-trustyaiservice, test-trustyaiservice-db,
# test-guardrails-builtin-upgrade) so we leave the destination namespace open and
# let CreateNamespace=true handle the ones declared inline in the manifests.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rhoai-2254-sample-trustyai
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "20"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/rh-aiservices-bu/rhoai-2.25-baseline.git
    targetRevision: main
    path: rhoai-2254-install/30-samples/trustyai
  destination:
    server: https://kubernetes.default.svc
    namespace: test-trustyaiservice
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 15
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
