---
# The rhoai-model-registries namespace is created by the RHOAI operator when the
# modelregistry component is Managed. This Application retries until the namespace
# and the modelregistries CRD exist.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rhoai-2254-sample-model-registry
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "20"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/rh-aiservices-bu/rhoai-2.25-baseline.git
    targetRevision: main
    path: rhoai-2254-install/30-samples/model-registry
  destination:
    server: https://kubernetes.default.svc
    namespace: rhoai-model-registries
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      # The ModelRegistry operator defaults grpc.port/rest.port and adds
      # rest.serviceRoute; SSA prevents this from registering as drift.
      - ServerSideApply=true
    retry:
      limit: 20
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
