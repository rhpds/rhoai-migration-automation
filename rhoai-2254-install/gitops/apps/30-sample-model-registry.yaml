---
# The rhoai-model-registries namespace is created by the RHOAI operator when the
# modelregistry component is Managed. This Application retries until the namespace
# and the modelregistries CRD exist.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rhoai-2254-sample-model-registry
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "20"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/rhpds/rhoai-migration-automation.git
    targetRevision: main
    path: rhoai-2254-install/30-samples/model-registry
  destination:
    server: https://kubernetes.default.svc
    namespace: rhoai-model-registries
  # The ModelRegistry operator defaults grpc.port, rest.port, rest.serviceRoute,
  # and re-orders mysql fields on every reconcile. SSA alone can't win because
  # git declares `grpc: {}` / `rest: {}` (required by the CRD schema) and
  # ArgoCD owns those empty maps. Delegate .spec authority to the operator.
  ignoreDifferences:
    - group: modelregistry.opendatahub.io
      kind: ModelRegistry
      jsonPointers:
        - /spec
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - ServerSideApply=true
    retry:
      limit: 20
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
