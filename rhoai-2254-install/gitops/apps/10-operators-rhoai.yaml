---
# Wave 5: RHOAI 2.25.6 operator Subscription. Pinned via installPlanApproval=Manual
# + startingCSV=rhods-operator.2.25.6. The InstallPlan-approval Job lives in a
# separate Application (10-installplan-approver.yaml, wave 6) so its sync isn't
# gated by this Application's health — the Subscription only reports Healthy after
# the CSV is Succeeded, and the CSV can't be Succeeded until the InstallPlan is
# approved, so a PostSync hook here would deadlock.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rhoai-2254-operator-rhoai
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/rhpds/rhoai-migration-automation.git
    targetRevision: main
    path: rhoai-2254-install/10-operators
    directory:
      include: "rhoai-operator.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: redhat-ods-operator
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    retry:
      limit: 15
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
