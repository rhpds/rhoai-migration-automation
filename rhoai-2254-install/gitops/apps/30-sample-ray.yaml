---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rhoai-2254-sample-ray
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "20"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/rh-aiservices-bu/rhoai-2.25-baseline.git
    targetRevision: main
    path: rhoai-2254-install/30-samples/ray
  destination:
    server: https://kubernetes.default.svc
    namespace: raytest
  # CodeFlare rewrites the RayCluster spec post-creation — adds TLS env vars,
  # cert volume mounts, a second container, `metadata: {}`, port protocol
  # defaults, drops `rayVersion`. SSA alone can't reconcile because git and
  # the operator both declare the container list. Delegate .spec authority
  # to CodeFlare / KubeRay entirely.
  ignoreDifferences:
    - group: ray.io
      kind: RayCluster
      jsonPointers:
        - /spec
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
      - ServerSideApply=true
    retry:
      limit: 60
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 2m
