---
# Kustomize refuses to load `resources:` entries above the current overlay
# directory (LoadRestrictionsRootOnly, the default). The overlays under
# gitops/overlays/*/kustomization.yaml reference Applications in ../../apps/,
# which trips this check with "file is not in or below overlay". Setting
# LoadRestrictionsNone on the ArgoCD instance disables the restriction for
# every Application the repo-server builds. bootstrap.sh applies this after
# the operator has created the openshift-gitops ArgoCD CR.
apiVersion: argoproj.io/v1beta1
kind: ArgoCD
metadata:
  name: openshift-gitops
  namespace: openshift-gitops
spec:
  kustomizeBuildOptions: "--load-restrictor=LoadRestrictionsNone"
  # Track managed resources by the argocd.argoproj.io/tracking-id annotation
  # instead of the default app.kubernetes.io/instance label. The RHPDS
  # gitops-bootstrap health check selects Applications by that label
  # (app.kubernetes.io/instance=bootstrap-infra), which the overlays and the
  # root Application set explicitly. With the default label-based tracking,
  # ArgoCD would own that label on managed objects and fight the hardcoded
  # value; annotation tracking frees the label for the bootstrap selector.
  resourceTrackingMethod: annotation
  # Default operator memory limit for the application-controller is 2Gi.
  # Under the 30-sample-* retry policy (limit: 60, backoff.maxDuration: 2m)
  # the controller's working set — active Applications + rendered manifests
  # + concurrent apply attempts — comfortably exceeds 2Gi across the ~20
  # Applications this install creates. Observed peak on a fresh install:
  # ~1.7 GiB steady-state, spiking during initial sync. Leaving the default
  # in place causes recurring OOMKills every ~20s during bootstrap, leaving
  # some resources half-applied (Namespaces + PVCs land, ISVCs don't).
  # Bumping the limit to 6Gi eliminates the OOM without needing to soften
  # the retry policy that the CRD-race workaround depends on.
  controller:
    resources:
      limits:
        cpu: "2"
        memory: "6Gi"
      requests:
        cpu: "250m"
        memory: "1Gi"
