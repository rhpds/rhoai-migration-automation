---
# OpenShift GitOps operator (Argo CD). Cluster-scoped install in openshift-operators.
# The operator auto-creates the default ArgoCD CR + Argo CD instance in
# openshift-gitops. The bootstrap.sh driver waits for the openshift-gitops-server
# Deployment to be Available before applying the root Application.
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: openshift-gitops-operator
  namespace: openshift-operators
spec:
  channel: latest
  name: openshift-gitops-operator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
  installPlanApproval: Automatic
