---
# Service Mesh 2 + Kiali. Required by RHOAI 2.25.6 for KServe Serverless mode —
# will be REMOVED during migration to 3.3.3 (replaced by Service Mesh 3).
#
# Jaeger is NOT subscribed: the jaeger-product package is no longer in the 4.20
# catalogs (Red Hat replaced it with Tempo/OpenTelemetry). RHOAI's default DSCI
# uses metricsCollection: Istio, so tracing via Jaeger is not required for the SMCP.
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: servicemeshoperator
  namespace: openshift-operators
spec:
  channel: stable
  name: servicemeshoperator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
  installPlanApproval: Automatic
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: kiali-ossm
  namespace: openshift-operators
spec:
  channel: stable
  name: kiali-ossm
  source: redhat-operators
  sourceNamespace: openshift-marketplace
  installPlanApproval: Automatic
